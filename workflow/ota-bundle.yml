# ───────────────────────────────────────────────────────────────
# GitHub-OTA: Build & publish JS bundle on every push to main
# Generated by: npx github-ota-init
#
# This workflow:
#   1. Checks out the repo
#   2. Installs JS dependencies
#   3. Embeds the git commit hash (via react-native-github-ota)
#   4. Builds the React Native JS bundle
#   5. Creates an ota-manifest.json with commit metadata
#   6. Uploads bundle + manifest to a GitHub Release tagged "ota-latest"
# ───────────────────────────────────────────────────────────────
name: OTA Bundle

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-ota:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Embed commit info
        run: node node_modules/react-native-github-ota/scripts/embed-commit.js

      - name: Bundle JS (Android)
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output index.android.bundle \
            --assets-dest ./ota-assets

      - name: Create OTA manifest
        run: |
          cat > ota-manifest.json <<EOF
          {
            "commitHash": "${{ github.sha }}",
            "commitShort": "$(echo ${{ github.sha }} | cut -c1-7)",
            "commitMessage": $(echo '${{ toJSON(github.event.head_commit.message) }}' | head -1),
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "bundleFile": "index.android.bundle"
          }
          EOF

      - name: Upload OTA release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ota-latest
          name: OTA Latest
          body: |
            Automated OTA build from commit ${{ github.sha }}
          files: |
            index.android.bundle
            ota-manifest.json
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
